# Example: release bundle + optional overrides (same as antora-playbook.yml)
# For vendoring the full theme, copy supplemental-ui/ and use Method 5 in the docs.

site:
  title: My Documentation Site (Local)
  # start_page: component::index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs

ui:
  bundle:
    url: https://github.com/antora-supplemental/antora-dark-theme/releases/download/v1.0.9/ui-bundle.zip
    snapshot: true
  # supplemental_files: ./supplemental-ui-overrides

output:
  dir: ./build/site

asciidoc:
  attributes:
    source-highlighter: highlight.js
    icons: font
