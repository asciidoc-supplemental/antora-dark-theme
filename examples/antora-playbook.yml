# Example Antora Playbook with Dark Theme
# Copy this file to your documentation project root and customize as needed

site:
  title: My Documentation Site
  # url: https://docs.example.com
  # start_page: component::index.adoc

content:
  sources:
    # Local documentation source
    - url: .
      branches: HEAD
      start_path: docs
    # Remote Git repository (uncomment to use)
    # - url: https://github.com/your-org/your-repo.git
    #   branches: [main, v*]
    #   start_path: docs

ui:
  bundle:
    # Recommended: pre-built bundle (Default UI + dark theme). Pin a release tag in CI.
    url: https://github.com/antora-supplemental/antora-dark-theme/releases/download/v1.0.9/ui-bundle.zip
    snapshot: true
  # Optional: one directory of your files only (logo, favicon, etc.)
  # supplemental_files: ./supplemental-ui-overrides

output:
  dir: ./build/site

asciidoc:
  attributes:
    source-highlighter: highlight.js
    icons: font
